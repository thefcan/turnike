# Observability drill arm: DEMO_BACKEND=degrade selects this config so
# the provisioned Grafana dashboard can show the failure story live -
# `docker compose stop redis` flips every replica to its in-memory
# fallback (degrade_* decision rates, breaker Open, backend memory),
# `start redis` shows the probe-driven recovery.
#
# Not a scripts/demo_bypass.sh arm: the bypass measurement drives only
# memory|redis and pins fail_closed on its redis arm for its own
# reasons (see gateway-redis.yaml). Here on_error stays the degrade
# default precisely because the fallback IS the story. rate 2/s keeps
# denies visible in BOTH phases of the README's parallel hammer:
# healthy, everything past the shared 2/s quota is denied; degraded,
# the aggregate fallback quota is only replicas × 2/s, still far below
# the hammer - a bigger rate would let the per-instance fallbacks
# admit everything and hide the degraded deny band (a sequential curl
# loop hides it the same way, from the other side).
server:
  listen: ":8080"

limiter:
  backend: redis
  redis:
    addr: redis:6379
    on_error: degrade

routes:
  - prefix: /demo/
    upstream: http://mock:9000
    limit:
      algorithm: fixed_window
      rate: 2
      window: 1s
