server:
  listen: ":8080"
  # Optional timeouts (defaults shown). write_timeout also caps how long a
  # proxied response may take.
  # read_header_timeout: 5s
  # read_timeout: 30s
  # write_timeout: 60s
  # idle_timeout: 120s
  # shutdown_timeout: 10s

# Optional HTTP client settings for talking to upstreams (defaults shown);
# one transport with these timeouts is shared across all routes.
# upstream:
#   dial_timeout: 5s
#   response_header_timeout: 10s

limiter:
  backend: memory # memory | redis (redis lands in M3)
  # redis:
  #   addr: localhost:6379

# Routing: segment-boundary longest-prefix. A prefix matches whole path
# segments only ("/api" matches "/api" and "/api/users", not "/apiv2";
# "/api/v1" does not match "/api/v1beta/x"); trailing slashes are
# insignificant, and when multiple prefixes match, the longest one wins.
routes:
  - prefix: /api/
    upstream: http://localhost:9000
    limit:
      algorithm: token_bucket # token_bucket | fixed_window | sliding_window
      rate: 10 # requests allowed per window
      burst: 20 # token_bucket only: bucket capacity
      # window: for token_bucket the refill interval (optional, default 1s);
      # required for fixed_window / sliding_window. burst is invalid there.
    key_overrides:
      demo-premium-key:
        rate: 100
        burst: 200

  - prefix: /search/
    upstream: http://localhost:9000
    limit:
      algorithm: sliding_window
      rate: 5
      window: 10s

  - prefix: /auth/
    upstream: http://localhost:9000
    limit:
      algorithm: fixed_window
      rate: 3
      window: 10s
