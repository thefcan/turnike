# Demo load balancer for the M4 multi-instance bypass demo.
#
# worker_processes 1 is load-bearing: OSS nginx keeps round-robin state
# per worker, so a single worker plus sequential client requests gives
# strict rotation — 150 requests split exactly 50 per replica.
worker_processes 1;

events {
    worker_connections 256;
}

http {
    upstream turnike {
        # max_fails=0: never eject a replica from rotation. A broken
        # replica must surface as failed requests in the raw output,
        # not as a silent redistribution that corrupts the per-replica
        # counts the demo publishes.
        server gateway-1:8080 max_fails=0;
        server gateway-2:8080 max_fails=0;
        server gateway-3:8080 max_fails=0;
    }

    server {
        listen 8080;

        location / {
            proxy_pass http://turnike;
            # Never retry on a sibling replica: a failed request must
            # stay a failed request. (429 is a completed HTTP response,
            # never a peer error, so it would not be retried even by
            # default — but be explicit.)
            proxy_next_upstream off;
            # Which replica answered; "always" so 429s carry it too
            # (add_header's default code list excludes 4xx, and losing
            # denial attribution would blind the per-replica breakdown).
            add_header X-Demo-Upstream $upstream_addr always;
        }
    }
}
