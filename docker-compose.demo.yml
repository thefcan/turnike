# Demo: nginx round-robin across 3 gateway replicas over ONE redis
# (M4), with prometheus + grafana provisioned on top (M5).
#
# DEMO_BACKEND (memory|redis|degrade|load|load-memory, default redis)
# selects which demo/ config every replica loads. scripts/demo_bypass.sh
# drives the memory and redis arms (`make demo`); DEMO_BACKEND=degrade is
# the observability drill - stop/start redis and watch the provisioned
# dashboard at http://localhost:3300; the load/load-memory arms are the
# M6 k6 latency & admission runs (scripts/load_test.sh, `make load`).
#
# The project name is distinct from the dev compose (which defaults to
# the directory name, "turnike") so `down` here can never touch the
# possibly-in-use dev redis/mock. Published ports avoid everything the
# dev compose owns (6379, 9000): nginx 8090, prometheus 9090, and
# grafana on 3300 rather than its native 3000 - the single most
# commonly dev-occupied port, and a clash would wedge `up --wait` for
# the measured M4 runs too.
name: turnike-demo

# Common replica block. Only gateway-1 carries `build:` — the shared
# image tag makes the other two reuse the same build instead of racing
# three identical ones.
x-gateway: &gateway
  image: turnike-gateway:demo
  command: ["-config", "/etc/turnike/gateway-${DEMO_BACKEND:-redis}.yaml"]
  volumes:
    - ./demo:/etc/turnike:ro
  depends_on:
    redis:
      condition: service_healthy
    mock:
      condition: service_healthy
  # /readyz, not /healthz: the memory arm has no ready checks and goes
  # 200 once listening, but the redis arm runs fail_closed, which is the
  # one policy that puts the redis ping on /readyz — so `up --wait`
  # returns only after every replica has verified real redis
  # connectivity, before the script fires a single request.
  healthcheck:
    test: ["CMD", "wget", "-q", "-T", "2", "-O", "/dev/null", "http://127.0.0.1:8080/readyz"]
    interval: 2s
    timeout: 3s
    retries: 15
    start_period: 5s

services:
  redis:
    image: redis:7-alpine
    # No host port and no volume: only the replicas talk to it, and no
    # limiter state may survive between demo arms.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mock:
    build:
      context: .
      target: mock
    image: turnike-mock:demo
    command: ["-addr", ":9000"]
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "2", "-O", "/dev/null", "http://127.0.0.1:9000/"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s

  gateway-1:
    <<: *gateway
    build:
      context: .
      target: gateway

  gateway-2: *gateway

  gateway-3: *gateway

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./demo/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8090:8080"
    depends_on:
      gateway-1:
        condition: service_healthy
      gateway-2:
        condition: service_healthy
      gateway-3:
        condition: service_healthy
    # Deliberately no healthcheck: a check routed through nginx would
    # consume round-robin picks during the measured run. The script's
    # warmup loop covers the "running but not yet accepting" race.

  # The observability pair carries no healthchecks on purpose: `up -d
  # --wait` treats healthcheck-less services as ready-when-running, so
  # a slow grafana boot can never wedge or delay a demo_bypass.sh
  # measurement. Both are provisioned from read-only bind mounts under
  # demo/, never named volumes - the teardown is `down --volumes`, and
  # wiping their state between runs is exactly the same-panels-for-
  # everyone guarantee.
  prometheus:
    image: prom/prometheus:v3.5.5
    volumes:
      - ./demo/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:12.4.5
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/turnike.json
    volumes:
      - ./demo/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./demo/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3300:3000"
    depends_on:
      - prometheus
