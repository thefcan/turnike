services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mock:
    build:
      context: .
      target: mock
    command: ["-addr", ":9000"]
    ports:
      - "9000:9000"
